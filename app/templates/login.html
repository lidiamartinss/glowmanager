<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowManager - Login</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-login {
            border: none;
            border-radius: 15px;
            box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.05);
        }
        .btn-glow {
            background-color: #343a40;
            color: white;
            border-radius: 25px;
        }
        .btn-glow:hover {
            background-color: #23272b;
            color: white;
        }
    </style>
</head>
<body>

    <div class="container" style="max-width: 400px;">
        <div class="card card-login p-4 bg-white">
            <div class="text-center mb-4">
                <h2 class="font-weight-bold text-dark">✨ GlowManager</h2>
                <p class="text-muted small">Faça login para gerenciar seu salão</p>
            </div>

            {% if form.errors %}
                <div class="alert alert-danger text-center small" role="alert">
                    Usuário ou senha incorretos!
                </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                
                <div class="form-group">
                    <label class="font-weight-bold">Usuário</label>
                    <input type="text" name="username" class="form-control" placeholder="Digite seu usuário" required>
                </div>

                <div class="form-group">
                    <label class="font-weight-bold">Senha</label>
                    <input type="password" name="password" class="form-control" placeholder="Digite sua senha" required>
                </div>

                <button type="submit" class="btn btn-glow btn-block mt-4 p-2 font-weight-bold">Entrar no Sistema</button>
            </form>
        </div>
    </div>

</body>
</html>
